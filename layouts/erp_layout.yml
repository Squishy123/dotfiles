session_name: erp
start_directory: ~/projects/erp/
windows:
  - window_name: main-code
    layout: main-horizontal
    options:
      main-pane-height: 50%
    focus: true
    panes:
      - shell_command: 
          - vim
        focus: true
  - window_name: core
    panes:
      - cd core && vim
      - cd core
  - window_name: consignment2
    panes: 
      - cd consignment2 && vim 
      - cd consignment2
  - window_name: term 
    panes: 
      - git status
      - 
